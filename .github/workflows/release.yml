name: Release Windows Installer

on:
  push:
    tags:
      - "v*.*.*"
      - "electron-v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node + frontend build ──────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm 9
        shell: pwsh
        run: npm install -g pnpm@9.12.0

      - name: Install frontend deps
        shell: pwsh
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: pnpm run build

      - name: Verify frontend dist
        shell: pwsh
        run: |
          if (-not (Test-Path "frontend\dist\index.html")) {
            throw "Frontend build failed — dist/index.html not found"
          }
          Write-Host "Frontend OK: $(Get-ChildItem frontend\dist -Recurse -File | Measure-Object).Count files"

      # ── 3. Python + deps ─────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install packaging pyinstaller pystray pillow

      # ── 4. PyInstaller ───────────────────────────────────────────────────
      - name: Sync installer version with tag
        shell: pwsh
        run: |
          # Extract semver from tag (strip 'v' or 'electron-v' prefix)
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^(electron-v|v)', ''
          Write-Host "Setting installer.iss MyAppVersion to $ver"
          (Get-Content installer\installer.iss) `
            -replace '#define MyAppVersion\s+"[^"]*"', "#define MyAppVersion    `"$ver`"" |
            Set-Content installer\installer.iss

      - name: Copy backend/app to root
        shell: pwsh
        run: |

          Write-Host "Copying backend\app -> app\"
          Copy-Item -Recurse -Force backend\app app
          Write-Host "app\ contents: $(Get-ChildItem app | Select-Object -ExpandProperty Name)"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # Use python -m PyInstaller — most reliable cross-platform invocation
          $env:PYTHONPATH = "$pwd"
          python -m PyInstaller `
            installer\spec.spec `
            --distpath dist_win `
            --workpath build_win `
            --noconfirm `
            --log-level WARN

      - name: Verify exe
        shell: pwsh
        run: |
          $exe = "dist_win\SonioxLiveTranslate\SonioxLiveTranslate.exe"
          if (Test-Path $exe) {
            $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
            Write-Host "OK: SonioxLiveTranslate.exe ($mb MB)"
          } else {
            Write-Host "ERROR: exe not found. dist_win contents:"
            Get-ChildItem dist_win -Recurse | Select-Object -First 20 | Select-Object FullName
            exit 1
          }

      # ── 5. Inno Setup ────────────────────────────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (Get-Command ISCC.exe -ErrorAction SilentlyContinue) {
            Write-Host "ISCC.exe already on PATH"
          } else {
            choco install innosetup --no-progress -y
          }

      - name: Build installer
        shell: pwsh
        run: |
          # Search common paths for ISCC.exe
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            (Get-Command ISCC.exe -ErrorAction SilentlyContinue)?.Source
          )
          $iscc = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after choco install" }
          Write-Host "Using ISCC: $iscc"
          & $iscc installer\installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Verify installer
        shell: pwsh
        run: |
          $f = Get-ChildItem installer_output -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($f) {
            $mb = [math]::Round($f.Length / 1MB, 1)
            Write-Host "Installer: $($f.Name) ($mb MB)"
          } else {
            Write-Host "installer_output contents:"
            Get-ChildItem installer_output -ErrorAction SilentlyContinue
            throw "No installer .exe produced"
          }

      # ── 6. GitHub Release ─────────────────────────────────────────────────
      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: installer_output/SonioxLiveTranslate-Setup-*.exe
          generate_release_notes: true
          body: |
            ## Soniox Live Translate ${{ github.ref_name }}

            ### Có gì mới
            - Tách hoàn toàn state và lifecycle của STT và TTS
            - Thêm hai nút STT/TTS độc lập; TTS luôn có thể bật/tắt khi STT đang nghe
            - Tắt TTS chỉ hủy audio/synthesis, không đóng WebSocket hoặc xóa transcript
            - Bật lại TTS chỉ đọc các câu dịch mới, không restart STT và không phát lại câu cũ
            - Thêm giao thức subscription TTS động cho cả microphone và audio file
            - Bổ sung kiểm thử hồi quy cho toggle độc lập và luồng dữ liệu một chiều

            ### Cài đặt trên Windows
            1. Tải file `.exe` bên dưới
            2. Chạy installer → cài vào `Program Files`
            3. Mở app từ Desktop / Start Menu
            4. Lần đầu: nhập Soniox API key; trong Settings có thể kiểm tra và lưu key provider khác bằng **Test**

            ### Yêu cầu
            - Windows 10/11 (64-bit)
            - Soniox API key: https://console.soniox.com
            - Microsoft Edge WebView2 Runtime (có sẵn trên Windows 10/11 hiện đại)

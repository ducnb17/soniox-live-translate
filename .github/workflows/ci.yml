name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend syntax and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest==9.1.1 pytest-asyncio==1.4.0

      - name: Compile all backend Python files
        run: >-
          find backend/app -type f -name '*.py' -print0 |
          xargs -0 --no-run-if-empty python -m py_compile

      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build frontend
        working-directory: frontend
        run: pnpm run build
